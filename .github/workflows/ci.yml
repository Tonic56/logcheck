name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build standalone binary
        run: go build -o logcheck ./cmd/logcheck

      - name: Build plugin
        run: go build -buildmode=plugin -o logcheck.so ./plugin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logcheck-binaries
          path: |
            logcheck
            logcheck.so
